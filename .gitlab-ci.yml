stages:
  - build_image
  - validate

variables:
  ANSIBLE_CONFIG: "$CI_PROJECT_DIR/ansible.cfg"
  IAC_CI_IMAGE: "$CI_REGISTRY_IMAGE/iac-ci:latest"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  TF_IN_AUTOMATION: "true"
  TF_PLUGIN_CACHE_DIR: "$CI_PROJECT_DIR/.terraform.d/plugin-cache"

cache:
  key:
    files:
      - terraform/envs/nonprod/dev/.terraform.lock.hcl
      - terraform/modules/vm_stack/.terraform.lock.hcl
  paths:
    - .terraform.d/plugin-cache/
    - .cache/pip/
  policy: pull-push

build_iac_ci_image:
  stage: build_image
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
      command: ["--insecure-registry=10.10.10.111:5050"]
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  rules:
    - changes:
        - ci/Dockerfile
      when: on_success
    - when: manual
      allow_failure: true
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker build --pull -t "$IAC_CI_IMAGE" -f ci/Dockerfile .
    - docker push "$IAC_CI_IMAGE"

validate_iac:
  stage: validate
  image: "$IAC_CI_IMAGE"
  before_script:
    - mkdir -p "$TF_PLUGIN_CACHE_DIR" "$PIP_CACHE_DIR"
    - terraform version
    - ansible --version
  script:
    - terraform fmt -check -recursive
    - terraform -chdir=terraform/envs/nonprod/dev init -backend=false -input=false
    - terraform -chdir=terraform/envs/nonprod/dev validate -no-color
    - terraform -chdir=terraform/modules/vm_stack init -backend=false -input=false
    - terraform -chdir=terraform/modules/vm_stack validate -no-color
    - ansible-playbook --syntax-check -i ansible/inventory/hosts.ini.example ansible/playbook/ping.yml
    - ansible-playbook --syntax-check -i localhost, ansible/playbook/prepare-hugepages.yml
